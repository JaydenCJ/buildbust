<svg xmlns="http://www.w3.org/2000/svg" width="760" height="400" viewBox="0 0 760 400" font-family="Menlo, Consolas, monospace" font-size="14">
  <rect width="760" height="400" rx="10" fill="#101418"/>
  <circle cx="24" cy="22" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="22" r="6" fill="#ffbd2e"/>
  <circle cx="64" cy="22" r="6" fill="#27c93f"/>
  <text x="380" y="27" fill="#8b949e" text-anchor="middle" font-size="12">buildbust — which line busted your Docker build cache?</text>
  <g fill="#c9d1d9">
    <text x="24" y="62"><tspan fill="#7ee787">$</tspan> buildbust explain .</text>
    <text x="24" y="92"><tspan fill="#79c0ff">buildbust explain</tspan> — Dockerfile Dockerfile, context .</text>
    <text x="24" y="126" fill="#f85149" font-weight="bold">CACHE BUSTED at step 7/11 — stage "build", line 8</text>
    <text x="24" y="156">    8 | <tspan fill="#d2a8ff">COPY src/ ./src/</tspan></text>
    <text x="24" y="190">  cause: build context changed under COPY sources [src]</text>
    <text x="24" y="212">    <tspan fill="#e3b341">~ modified</tspan>      src/lib/util.js   <tspan fill="#8b949e">6eff59ffb1c7 → 417cc1b60cd0</tspan></text>
    <text x="24" y="246">  blast radius: <tspan fill="#f85149">4 of 11 steps rebuild</tspan>, <tspan fill="#7ee787">7 stay cached</tspan></text>
    <text x="24" y="268">    stage <tspan fill="#79c0ff">build</tspan>        steps 7-8    2 steps</text>
    <text x="24" y="290">    stage <tspan fill="#79c0ff">stage-2</tspan>      steps 10-11  2 steps   <tspan fill="#8b949e">via COPY --from=build (line 12)</tspan></text>
    <text x="24" y="330"><tspan fill="#7ee787">$</tspan> echo $?</text>
    <text x="24" y="352"><tspan fill="#e3b341">1</tspan>  <tspan fill="#8b949e"># exit 1 = busted, 0 = every step still cached</tspan></text>
  </g>
</svg>
